<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="关键词资讯流">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>关键词资讯</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --primary: #667eea;
            --text: #1a1a2e;
            --text-light: #666;
            --gray: #f5f5f7;
            --border: #e8e8e8;
            --card-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
            background: var(--gray);
            color: var(--text);
            min-height: 100vh;
            font-size: 14px;
            overscroll-behavior-y: contain;
        }
        
        /* Header */
        .header {
            background: var(--primary-gradient);
            padding: 16px 20px;
            color: white;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        
        .header-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .header-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        .header-user {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .user-btn {
            padding: 6px 14px;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 16px;
            color: white;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .user-btn:active {
            transform: scale(0.95);
        }
        
        /* Keywords section - 默认隐藏，点击编辑时显示 */
        .keywords-section {
            background: white;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            display: none;  /* 默认隐藏 */
        }
        
        .keywords-section.show {
            display: block;  /* 显示时使用 */
        }
        
        .keywords-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .keywords-title {
            font-size: 14px;
            font-weight: 600;
        }
        
        .keywords-edit {
            font-size: 13px;
            color: var(--primary);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        
        .keywords-edit:active {
            background: rgba(102, 126, 234, 0.1);
        }
        
        .keywords-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .keyword-tag {
            padding: 6px 14px;
            background: var(--gray);
            border-radius: 16px;
            font-size: 13px;
            color: var(--text-light);
            transition: all 0.2s ease;
            animation: fadeIn 0.3s ease backwards;
        }
        
        .keyword-tag.active {
            background: rgba(102, 126, 234, 0.1);
            color: var(--primary);
        }
        
        /* Stats */
        .stats-bar {
            display: flex;
            background: white;
            padding: 12px 20px;
            gap: 20px;
            border-bottom: 1px solid var(--border);
        }
        
        .stat-item {
            text-align: center;
            animation: slideUp 0.3s ease backwards;
        }
        
        .stat-value {
            font-size: 18px;
            font-weight: 600;
            color: var(--primary);
        }
        
        .stat-label {
            font-size: 12px;
            color: var(--text-light);
        }
        
        /* Feed */
        .feed {
            padding: 16px;
            max-width: 600px;
            margin: 0 auto;
            padding-bottom: 100px;
        }
        
        .feed-item {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: var(--card-shadow);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            animation: slideUp 0.4s ease backwards;
        }
        
        .feed-item:active {
            transform: scale(0.98);
        }
        
        .feed-item:hover {
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
        }
        
        .feed-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .feed-source {
            font-size: 12px;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .feed-source .platform {
            background: var(--primary);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
        }
        
        .feed-match {
            font-size: 12px;
            color: var(--primary);
            background: rgba(102, 126, 234, 0.1);
            padding: 2px 10px;
            border-radius: 10px;
        }
        
        .feed-title {
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 8px;
            transition: color 0.2s;
        }
        
        .feed-title:hover {
            color: var(--primary);
        }
        
        .feed-footer {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-light);
        }
        
        /* Loading & Empty */
        .loading, .empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
            animation: fadeIn 0.3s ease;
        }
        
        .loading::after {
            content: '';
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }
        
        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideUp {
            from { 
                opacity: 0;
                transform: translateY(20px);
            }
            to { 
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Stagger animations */
        .feed-item:nth-child(1) { animation-delay: 0s; }
        .feed-item:nth-child(2) { animation-delay: 0.05s; }
        .feed-item:nth-child(3) { animation-delay: 0.1s; }
        .feed-item:nth-child(4) { animation-delay: 0.15s; }
        .feed-item:nth-child(5) { animation-delay: 0.2s; }
        .feed-item:nth-child(6) { animation-delay: 0.25s; }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: flex-end;
            padding: 20px;
            padding-bottom: env(safe-area-inset-bottom, 20px);
            animation: fadeIn 0.2s ease;
        }
        
        .modal-content {
            background: white;
            border-radius: 20px 20px 0 0;
            padding: 24px;
            width: 100%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-label {
            display: block;
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 8px;
        }
        
        .form-input, .form-textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            -webkit-appearance: none;
        }
        
        .form-input:focus, .form-textarea:focus {
            border-color: var(--primary);
        }
        
        /* Checkbox group */
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 8px 0;
        }
        
        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            background: var(--gray);
            border-radius: 16px;
            font-size: 13px;
            cursor: pointer;
        }
        
        .checkbox-group input[type="checkbox"] {
            accent-color: var(--primary);
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-appearance: none;
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        .btn-primary {
            background: var(--primary-gradient);
            color: white;
        }
        
        .btn-secondary {
            background: var(--gray);
            color: var(--text);
        }
        
        /* Pull to refresh */
        .pull-refresh {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 13px;
            transform: translateY(-100%);
            transition: transform 0.3s;
            z-index: 101;
        }
        
        .pull-refresh.active {
            transform: translateY(0);
        }
        
        /* Safe area for mobile */
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            .bottom-nav {
                padding-bottom: calc(8px + env(safe-area-inset-bottom));
            }
        }
        
        /* Responsive */
        @media (min-width: 768px) {
            .feed {
                padding: 24px;
            }
            
            .feed-item {
                padding: 20px;
            }
            
            .header, .keywords-section, .stats-bar {
                padding-left: calc(50% - 300px);
                padding-right: calc(50% - 300px);
            }
            
            .feed-item:hover {
                transform: translateY(-2px);
            }
        }
        
        @media (max-width: 380px) {
            .header-title {
                font-size: 16px;
            }
            
            .feed-title {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- Pull to refresh -->
    <div class="pull-refresh" id="pullRefresh">
        <span>下拉刷新...</span>
    </div>
    
    <!-- Header -->
    <div class="header">
        <div class="header-main">
            <div class="header-title">关键词资讯</div>
            <div class="header-user">
                <button class="user-btn" id="userBtn" onclick="showLogin()">登录</button>
            </div>
        </div>
        
    </div>
    
    <!-- Stats -->
    <div class="stats-bar">
        <div class="stat-item">
            <div class="stat-value" id="totalCount">0</div>
            <div class="stat-label">匹配资讯</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="todayCount">0</div>
            <div class="stat-label">今日新增</div>
        </div>
    </div>
    
    <!-- Feed -->
    <div class="feed" id="feedList">
        <div class="loading">加载中...</div>
    </div>
    
    <!-- Login Modal -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <div class="modal-title" id="loginTitle">登录</div>
            <div class="form-group">
                <input type="text" class="form-input" id="username" placeholder="用户名">
            </div>
            <div class="form-group">
                <input type="password" class="form-input" id="password" placeholder="密码">
            </div>
            <button class="btn btn-primary" onclick="doLogin()">登录</button>
            <button class="btn btn-secondary" onclick="doRegister()">注册</button>
            <button class="btn btn-secondary" onclick="hideLogin()" style="margin-top:10px;margin-bottom:0">取消</button>
        </div>
    </div>
    
    <!-- Account Settings Modal (包含关键词管理) -->
    <div class="modal" id="accountModal">
        <div class="modal-content">
            <div class="modal-title">账号管理</div>
            
            <div class="form-group">
                <label class="form-label">关注关键词（逗号分隔）</label>
                <textarea class="form-textarea" id="keywordsInput" rows="3" placeholder="如: AI,科技,基金,芯片"></textarea>
            </div>
            
            <div class="form-group">
                <label class="form-label">屏蔽关键词</label>
                <textarea class="form-textarea" id="blockedInput" rows="2" placeholder="不想看到的内容"></textarea>
            </div>
            
            <div class="form-group">
                <label class="form-label">监控平台</label>
                <div class="checkbox-group" id="platformsGroup">
                    <label><input type="checkbox" value="weibo" /> 微博</label>
                    <label><input type="checkbox" value="baidu" /> 百度</label>
                    <label><input type="checkbox" value="douyin" /> 抖音</label>
                    <label><input type="checkbox" value="bilibili" /> B站</label>
                </div>
            </div>
            
            <button class="btn btn-primary" onclick="saveUserConfig()">保存设置</button>
            <button class="btn btn-secondary" onclick="logout()">退出登录</button>
            <button class="btn btn-secondary" onclick="hideAccountModal()" style="margin-top:10px;margin-bottom:0">关闭</button>
        </div>
    </div>
    
    <!-- Keywords Edit Modal -->
    <script>
        // PWA Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
        }
        
        let currentUser = null;
        let userKeywords = [];
        let blockedKeywords = [];
        let userPlatforms = [];
        let allNews = [];
        let pullStartY = 0;
        
        // Init
        init();
        
        async function init() {
            await checkLogin();
            await loadNews();
            initPullRefresh();
        }
        
        function initPullRefresh() {
            document.addEventListener('touchstart', e => {
                pullStartY = e.touches[0].clientY;
            }, { passive: true });
            
            document.addEventListener('touchmove', e => {
                const y = e.touches[0].clientY;
                const diff = y - pullStartY;
                if (diff > 0 && window.scrollY === 0) {
                    document.getElementById('pullRefresh').classList.add('active');
                }
            }, { passive: true });
            
            document.addEventListener('touchend', async () => {
                document.getElementById('pullRefresh').classList.remove('active');
                // Refresh on pull
                if (window.scrollY === 0) {
                    await loadNews(true);
                }
            }, { passive: true });
        }
        
        async function checkLogin() {
            try {
                const r = await fetch('/api/check-login');
                const d = await r.json();
                if (d.logged_in) {
                    currentUser = d.username;
                    document.getElementById('userBtn').textContent = d.username;
                    loadUserConfig();
                }
            } catch(e) {}
        }
        
        async function loadUserConfig() {
            try {
                const r = await fetch('/api/config');
                const d = await r.json();
                if (d.success && d.config) {
                    userKeywords = d.config.keywords || [];
                    blockedKeywords = d.config.blocked_keywords || [];
                    userPlatforms = d.config.platforms || [];
                    renderKeywords();
                    filterAndRender();
                }
            } catch(e) {}
        }
        
        function renderKeywords() {
            const container = document.getElementById('keywordsList');
            if (!userKeywords.length) {
                container.innerHTML = '<span class="keyword-tag">暂无关键词</span>';
                return;
            }
            container.innerHTML = userKeywords.map((kw, i) => 
                `<span class="keyword-tag" style="animation-delay: ${i * 0.05}s">${kw}</span>`
            ).join('');
        }
        
        async function loadNews(force = false) {
            try {
                const url = force ? '/api/news?force=1' : '/api/news';
                const r = await fetch(url);
                const d = await r.json();
                if (d.success) {
                    allNews = d.news || [];
                    filterAndRender();
                }
            } catch(e) {
                document.getElementById('feedList').innerHTML = '<div class="empty">加载失败</div>';
            }
        }
        
        function filterAndRender() {
            const container = document.getElementById('feedList');
            
            let filtered = allNews;
            
            if (userKeywords.length > 0) {
                filtered = allNews.filter(item => {
                    const title = item.title;
                    const matches = userKeywords.some(kw => title.includes(kw));
                    const blocked = blockedKeywords.some(bk => title.includes(bk));
                    return matches && !blocked;
                });
            } else if (blockedKeywords.length > 0) {
                filtered = allNews.filter(item => {
                    const title = item.title;
                    return !blockedKeywords.some(bk => title.includes(bk));
                });
            }
            
            document.getElementById('totalCount').textContent = filtered.length;
            document.getElementById('todayCount').textContent = filtered.length;
            
            if (!filtered.length) {
                container.innerHTML = '<div class="empty">' + 
                    (userKeywords.length ? '暂无匹配资讯' : '请添加关注的关键词') + 
                    '</div>';
                return;
            }
            
            filtered.sort((a, b) => (b.hot || 0) - (a.hot || 0));
            
            container.innerHTML = filtered.map((item, i) => {
                const matched = userKeywords.filter(kw => item.title.includes(kw));
                
                return `
                    <div class="feed-item" style="animation-delay: ${i * 0.05}s" onclick="window.open('${item.url}', '_blank')">
                        <div class="feed-header">
                            <span class="feed-source"><span class="platform">${item.platform}</span> ${item.time}</span>
                            ${matched.length ? `<span class="feed-match">${matched[0]}</span>` : ''}
                        </div>
                        <div class="feed-title">${item.title}</div>
                        <div class="feed-footer">
                            <span>热度: ${item.hot || '-'}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Login functions
        function showLogin() {
            document.getElementById('loginModal').style.display = 'flex';
        }
        
        function hideLogin() {
            document.getElementById('loginModal').style.display = 'none';
        }
        
        async function doLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const r = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: u, password: p})
            });
            const d = await r.json();
            if (d.success) {
                currentUser = d.username;
                document.getElementById('userBtn').textContent = d.username;
                document.getElementById('userBtn').onclick = showAccountModal;
                hideLogin();
                loadUserConfig();
            } else {
                alert(d.error || '登录失败');
            }
        }
        
        async function doRegister() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const r = await fetch('/api/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: u, password: p})
            });
            const d = await r.json();
            if (d.success) {
                currentUser = d.username;
                document.getElementById('userBtn').textContent = d.username;
                hideLogin();
                loadUserConfig();
            } else {
                alert(d.error || '注册失败');
            }
        }
        
        // 账号管理 Modal
        async function showAccountModal() {
            await loadUserConfig();
            document.getElementById('keywordsInput').value = userKeywords.join(', ');
            document.getElementById('blockedInput').value = blockedKeywords.join(', ');
            
            // 设置平台复选框
            const platforms = userPlatforms || [];
            document.querySelectorAll('#platformsGroup input').forEach(cb => {
                cb.checked = platforms.includes(cb.value);
            });
            
            document.getElementById('accountModal').style.display = 'flex';
        }
        
        function hideAccountModal() {
            document.getElementById('accountModal').style.display = 'none';
        }
        
        async function saveUserConfig() {
            userKeywords = document.getElementById('keywordsInput').value
                .split(',').map(s => s.trim()).filter(s => s);
            blockedKeywords = document.getElementById('blockedInput').value
                .split(',').map(s => s.trim()).filter(s => s);
            
            // 获取选中的平台
            userPlatforms = [];
            document.querySelectorAll('#platformsGroup input:checked').forEach(cb => {
                userPlatforms.push(cb.value);
            });
            
            try {
                await fetch('/api/config', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        keywords: userKeywords,
                        blocked_keywords: blockedKeywords,
                        platforms: userPlatforms
                    })
                });
                alert('设置已保存');
                hideAccountModal();
                filterAndRender();
            } catch(e) {
                alert('保存失败');
            }
        }
        
        async function logout() {
            await fetch('/api/logout', {method: 'POST'});
            currentUser = null;
            userKeywords = [];
            blockedKeywords = [];
            userPlatforms = [];
            document.getElementById('userBtn').textContent = '登录';
            document.getElementById('userBtn').onclick = showLogin;
            hideAccountModal();
            filterAndRender();
        }
        
        // 兼容旧函数
        function showKeywordsEdit() {
            showAccountModal();
        }
        
        function hideKeywordsModal() {
            hideAccountModal();
        }
        
        async function saveKeywords() {
            await saveUserConfig();
        }
    </script>
</body>
</html>
