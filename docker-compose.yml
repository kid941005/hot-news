version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: hotnews123
      MYSQL_DATABASE: hot_news
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
    command: --default-authentication-plugin=mysql_native_password

  backend:
    image: kid941005/hot-news:latest
    # build: .  # 本地构建取消注释，同时注释上面 image 行
    ports:
      - "16888:16888"
    environment:
      - DATABASE_URL=mysql+pymysql://root:hotnews123@mysql:3306/hot_news
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
