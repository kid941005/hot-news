services:
  mysql:
    image: mysql:8.0
    container_name: hotnews-mysql
    environment:
      MYSQL_ROOT_PASSWORD: hotnews123
      MYSQL_DATABASE: hot_news
    ports:
      - "3306:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
    command: --default-authentication-plugin=mysql_native_password
    restart: always

  hotnews:
    image: kid941005/hot-news:latest
    container_name: hotnews
    ports:
      - "16888:16888"
    environment:
      - DATABASE_URL=mysql+pymysql://root:hotnews123@mysql:3306/hot_news
      - TZ=Asia/Shanghai
      - REFRESH_COOLDOWN_SECONDS=300
      - CORS_ORIGINS=*
      - SPIDER_CONCURRENCY=5
      - SPIDER_FETCH_TIMEOUT_SECONDS=15
      - LOG_LEVEL=INFO
    depends_on:
      mysql:
        condition: service_healthy
    restart: always

  mcp:
    image: kid941005/hot-news:latest
    container_name: hotnews-mcp
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://root:hotnews123@mysql:3306/hot_news
      - MCP_TRANSPORT=streamable-http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
      - MCP_PATH=/mcp
      - TZ=Asia/Shanghai
      - LOG_LEVEL=INFO
    command: ["python", "-m", "backend.mcp_server", "--transport", "streamable-http"]
    depends_on:
      mysql:
        condition: service_healthy
    restart: always

